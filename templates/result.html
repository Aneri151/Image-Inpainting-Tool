<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inpainting Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Inpainting Result</h1>
            <p class="text-muted mb-0">Review the captured processing steps from the uploaded image.</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{{ url_for('landing') }}" class="btn btn-outline-secondary">Home</a>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Upload another image</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4 col-md-6">
            <div class="card step-card p-3">
                <h5>Original</h5>
                <img src="{{ images.original }}" class="img-fluid rounded thumb-click" data-src="{{ images.original }}" alt="Original Image">
            </div>
        </div>
        <div class="col-lg-4 col-md-6">
            <div class="card step-card p-3">
                <h5>Gray + Mask</h5>
                <img src="{{ images.gray }}" class="img-fluid rounded mb-2 thumb-click" data-src="{{ images.gray }}" alt="Grayscale Image">
                <img src="{{ images.mask }}" class="img-fluid rounded thumb-click" data-src="{{ images.mask }}" alt="Mask Image">
            </div>
        </div>
        <div class="col-lg-4 col-md-6">
            <div class="card step-card p-3">
                <h5>State Map</h5>
                <img src="{{ images.state_map }}" class="img-fluid rounded thumb-click" data-src="{{ images.state_map }}" alt="State Map">
            </div>
        </div>
        <div class="col-lg-4 col-md-6">
            <div class="card step-card p-3">
                <h5>Distance Transform</h5>
                <img src="{{ images.distance_transform }}" class="img-fluid rounded thumb-click" data-src="{{ images.distance_transform }}" alt="Distance Transform">
            </div>
        </div>
        <div class="col-lg-4 col-md-6">
            <div class="card step-card p-3">
                <h5>Gradients</h5>
                <img src="{{ images.gradients }}" class="img-fluid rounded thumb-click" data-src="{{ images.gradients }}" alt="Gradients">
            </div>
        </div>
        <div class="col-lg-4 col-md-6">
            <div class="card step-card p-3">
                <h5>Mask Before Fill</h5>
                <img src="{{ images.mask_before_fill }}" class="img-fluid rounded thumb-click" data-src="{{ images.mask_before_fill }}" alt="Mask Before Fill">
            </div>
        </div>
        <div class="col-lg-4 col-md-6">
            <div class="card step-card p-3">
                <h5>After Initial Fill</h5>
                <img src="{{ images.after_initial_fill }}" class="img-fluid rounded thumb-click" data-src="{{ images.after_initial_fill }}" alt="After Initial Fill">
            </div>
        </div>
        <div class="col-lg-12">
            <div class="card p-3">
                <h5>Final Inpainted Output</h5>
                <div class="row gap-3 mt-3">
                    <div class="col-lg-6">
                        <div class="card p-3 h-100">
                            <h6 class="mb-3">Before</h6>
                            <img src="{{ images.original }}" class="img-fluid rounded thumb-click" data-src="{{ images.original }}" alt="Original Image">
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="card p-3 h-100">
                            <h6 class="mb-3">After</h6>
                            <img src="{{ images.final }}" class="img-fluid rounded thumb-click" data-src="{{ images.final }}" alt="Final Image">
                        </div>
                    </div>
                </div>
                <div class="mt-3 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-2">
                    <a href="{{ images.final }}" download="inpainted_result.png" class="btn btn-success">Download Final Result</a>
                    <small class="text-muted">Click thumbnails to view full-size</small>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<!-- Image modal -->
<div class="modal" id="imageModal" aria-hidden="true" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <button class="modal-close" aria-label="Close">×</button>
            <div class="modal-body">
                <img class="modal-img" src="" alt="Full image">
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</html>
